ambassador-admin-frontend:prod:
  stage: deploy
  trigger:
    project: integrations/ambassador-system/deployment/ambassador-admin-frontend
    branch: $CI_DEFAULT_BRANCH
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" 
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

ambassador-admin-frontend:dev:
  stage: deploy
  trigger:
    project: integrations/ambassador-system/deployment/ambassador-admin-frontend
    branch: "dev"
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" 
      when: never
    - if: $CI_COMMIT_BRANCH == "dev"
